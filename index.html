<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 Policia vs Ladrão 🚨</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f1f3f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .controls {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        canvas {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            cursor: pointer;
        }
        .status {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #2c3e50;
        }
        input { 
            padding: 10px; 
            width: 70px; 
            border: 2px solid #ddd; 
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="status" id="status">Vez dos Policiais</div>

    <div class="controls">
        <label>Níveis (Linhas):</label>
        <input type="number" id="levels" value="3" min="3" max="7">
        <button onclick="initGame()">Gerar Novo Tabuleiro</button>
    </div>

    <canvas id="gameCanvas" width="500" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const levelsInput = document.getElementById('levels');

        let nodes = [];
        let connections = [];
        let selectedNode = null;
        let turn = 'police';

        function initGame() {
            const levels = parseInt(levelsInput.value);
            nodes = [];
            connections = [];
            turn = 'police';
            selectedNode = null;
            statusText.innerText = "Vez dos Policiais";

            const padding = 80;
            const availableHeight = canvas.height - (padding * 2);
            const availableWidth = canvas.width - (padding * 2);

            for (let i = 0; i < levels; i++) {
                let nodesInRow = (i === levels - 1) ? 1 : 3; 
                for (let j = 0; j < nodesInRow; j++) {
                    let x = nodesInRow === 1 ? canvas.width / 2 : padding + (j * (availableWidth / (nodesInRow - 1)));
                    let y = padding + (i * (availableHeight / (levels - 1)));
                    nodes.push({ id: nodes.length, x, y, role: null, level: i });
                }
            }

            nodes.filter(n => n.level === 0).forEach(n => n.role = 'police');
            nodes[nodes.length - 1].role = 'thief';

            const maxDist = (availableHeight / (levels - 1)) * 1.6;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dist = Math.sqrt((nodes[i].x - nodes[j].x)**2 + (nodes[i].y - nodes[j].y)**2);
                    if (dist < maxDist) connections.push([i, j]);
                }
            }
            drawBoard();
        }

        function drawPolice(x, y) {
            ctx.font = '38px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('👮', x, y + 2); // Ajuste leve de Y
        }

        // --- ÍCONE DO LADRÃO OTIMIZADO (DESENHADO VIA CANVAS) ---
        function drawThief(x, y) {
            const r = 20; // Raio base da peça
            ctx.save();
            ctx.translate(x, y);

            // 1. Corpo/Base (Preto fosco)
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = "#1a202c";
            ctx.fill();

            // 2. A Máscara (Estilo Bandido Clássico)
            ctx.beginPath();
            ctx.moveTo(-15, -4);
            ctx.bezierCurveTo(-10, -10, 10, -10, 15, -4);
            ctx.bezierCurveTo(10, 2, -10, 2, -15, -4);
            ctx.fillStyle = "#a0aec0"; // Cinza azulado
            ctx.fill();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "#4a5568";
            ctx.stroke();

            // 3. Os Olhos
            ctx.beginPath();
            ctx.arc(-6, -4, 2.5, 0, Math.PI * 2); // Olho Esquerdo
            ctx.arc(6, -4, 2.5, 0, Math.PI * 2);  // Olho Direito
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-6, -4, 1, 0, Math.PI * 2); // Pupila Esq
            ctx.arc(6, -4, 1, 0, Math.PI * 2);  // Pupila Dir
            ctx.fillStyle = "#000000";
            ctx.fill();

            // 4. Chapéu/Gorro (Estilo Boina Escura)
            ctx.beginPath();
            ctx.ellipse(0, -14, 18, 9, 0, 0, Math.PI * 2);
            ctx.fillStyle = "#111111"; // Preto mais escuro
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = "#444444";
            ctx.stroke();

            ctx.restore();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Linhas de Conexão
            connections.forEach(conn => {
                ctx.beginPath();
                ctx.moveTo(nodes[conn[0]].x, nodes[conn[0]].y);
                ctx.lineTo(nodes[conn[1]].x, nodes[conn[1]].y);
                ctx.strokeStyle = '#cbd5e0';
                ctx.lineWidth = 6;
                ctx.stroke();
            });

            // Nós vazios
            nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, 28, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.strokeStyle = "#4a5568";
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Peças e Seleção (Desenhadas por último)
            nodes.forEach(node => {
                if (selectedNode === node) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 34, 0, Math.PI * 2);
                    ctx.strokeStyle = "#48bb78"; // Verde vibrante
                    ctx.lineWidth = 5;
                    ctx.stroke();
                }

                if (node.role === 'police') {
                    drawPolice(node.x, node.y);
                } else if (node.role === 'thief') {
                    drawThief(node.x, node.y);
                }
            });
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            nodes.forEach(node => {
                const dist = Math.sqrt((mouseX - node.x)**2 + (mouseY - node.y)**2);
                if (dist < 38) handleInteraction(node);
            });
        });

        function handleInteraction(node) {
            if (!selectedNode) {
                if (node.role === turn) selectedNode = node;
            } else {
                if (isValidMove(selectedNode, node)) {
                    node.role = selectedNode.role;
                    selectedNode.role = null;
                    selectedNode = null;
                    turn = (turn === 'police') ? 'thief' : 'police';
                    statusText.innerText = `Vez do ${turn === 'police' ? 'Policiais' : 'Ladrão'}`;
                    setTimeout(checkEndGame, 50);
                } else {
                    selectedNode = (node.role === turn) ? node : null;
                }
            }
            drawBoard();
        }

        function isValidMove(from, to) {
            if (to.role !== null) return false;
            return connections.some(c => (c[0] === from.id && c[1] === to.id) || (c[1] === from.id && c[0] === to.id));
        }

        function checkEndGame() {
            const thief = nodes.find(n => n.role === 'thief');
            if (!thief) return;
            const canThiefMove = nodes.some(n => isValidMove(thief, n));
            
            if (!canThiefMove) {
                alert("Policiais venceram! O ladrão foi capturado.");
                initGame();
            } else if (thief.level === 0) {
                alert("Ladrão venceu! Ele escapou.");
                initGame();
            }
        }

        initGame();
    </script>
</body>
</html>
