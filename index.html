<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 Policia vs Ladrão 🚨</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f1f3f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .controls {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        canvas {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            cursor: pointer;
        }
        .status {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #2c3e50;
        }
        input { 
            padding: 10px; 
            width: 70px; 
            border: 2px solid #ddd; 
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="status" id="status">Vez dos Policiais</div>

    <div class="controls">
        <label>Níveis:</label>
        <input type="number" id="levels" value="5" min="3" max="8">
        <button onclick="initGame()">Gerar Novo Tabuleiro</button>
    </div>

    <canvas id="gameCanvas" width="500" height="650"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const levelsInput = document.getElementById('levels');

        let nodes = [];
        let connections = [];
        let selectedNode = null;
        let turn = 'police';

        function initGame() {
            const levels = parseInt(levelsInput.value);
            nodes = [];
            connections = [];
            turn = 'police';
            selectedNode = null;
            statusText.innerText = "Vez dos Policiais";

            const paddingH = 70;
            const paddingV = 80;
            const availableHeight = canvas.height - (paddingV * 2);
            const availableWidth = canvas.width - (paddingH * 2);

            // 1. Geração de Nós (Grade 3 colunas, com funil no final)
            for (let i = 0; i < levels; i++) {
                let nodesInRow = (i === levels - 1) ? 1 : 3; 
                for (let j = 0; j < nodesInRow; j++) {
                    let x = nodesInRow === 1 ? canvas.width / 2 : paddingH + (j * (availableWidth / 2));
                    let y = paddingV + (i * (availableHeight / (levels - 1)));
                    nodes.push({ id: nodes.length, x, y, role: null, level: i, col: j });
                }
            }

            // 2. Distribuição Dinâmica de Policiais
            // Se níveis > 4, adicionamos policiais também na segunda linha para dificultar
            nodes.filter(n => n.level === 0).forEach(n => n.role = 'police');
            if (levels >= 5) {
                // Adiciona um policial extra no centro da segunda linha
                const secondRowCenter = nodes.find(n => n.level === 1 && n.col === 1);
                if (secondRowCenter) secondRowCenter.role = 'police';
            }
            
            // Ladrão no último
            nodes[nodes.length - 1].role = 'thief';

            // 3. Sistema de Conexão Inteligente (Grade + Diagonais)
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const n1 = nodes[i];
                    const n2 = nodes[j];
                    const dist = Math.sqrt((n1.x - n2.x)**2 + (n1.y - n2.y)**2);
                    
                    // Limiar de distância adaptativo baseado na altura dos níveis
                    const verticalGap = (availableHeight / (levels - 1));
                    const threshold = verticalGap * 1.45; 

                    if (dist < threshold) {
                        // Evita conexões horizontais muito longas pulando o centro
                        if (n1.level === n2.level && Math.abs(n1.col - n2.col) > 1) continue;
                        connections.push([i, j]);
                    }
                }
            }
            drawBoard();
        }

        function drawThief(x, y) {
            const r = 20;
            ctx.save();
            ctx.translate(x, y);
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = "#1a202c";
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-15, -4);
            ctx.bezierCurveTo(-10, -10, 10, -10, 15, -4);
            ctx.bezierCurveTo(10, 2, -10, 2, -15, -4);
            ctx.fillStyle = "#a0aec0";
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(-6, -4, 2.5, 0, Math.PI * 2);
            ctx.arc(6, -4, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(0, -14, 18, 9, 0, 0, Math.PI * 2);
            ctx.fillStyle = "#111111";
            ctx.fill();
            ctx.restore();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            connections.forEach(conn => {
                ctx.beginPath();
                ctx.moveTo(nodes[conn[0]].x, nodes[conn[0]].y);
                ctx.lineTo(nodes[conn[1]].x, nodes[conn[1]].y);
                ctx.strokeStyle = '#cbd5e0';
                ctx.lineWidth = 6;
                ctx.stroke();
            });

            nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, 28, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.strokeStyle = "#4a5568";
                ctx.lineWidth = 2;
                ctx.stroke();

                if (selectedNode === node) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 34, 0, Math.PI * 2);
                    ctx.strokeStyle = "#48bb78";
                    ctx.lineWidth = 5;
                    ctx.stroke();
                }

                if (node.role === 'police') {
                    ctx.font = '38px serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('👮', node.x, node.y + 2);
                } else if (node.role === 'thief') {
                    drawThief(node.x, node.y);
                }
            });
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            nodes.forEach(node => {
                if (Math.sqrt((mouseX - node.x)**2 + (mouseY - node.y)**2) < 35) handleInteraction(node);
            });
        });

        function handleInteraction(node) {
            if (!selectedNode) {
                if (node.role === turn) selectedNode = node;
            } else {
                if (isValidMove(selectedNode, node)) {
                    node.role = selectedNode.role;
                    selectedNode.role = null;
                    selectedNode = null;
                    turn = (turn === 'police') ? 'thief' : 'police';
                    statusText.innerText = `Vez do ${turn === 'police' ? 'Policiais' : 'Ladrão'}`;
                    setTimeout(checkEndGame, 50);
                } else {
                    selectedNode = (node.role === turn) ? node : null;
                }
            }
            drawBoard();
        }

        function isValidMove(from, to) {
            if (to.role !== null) return false;
            return connections.some(c => (c[0] === from.id && c[1] === to.id) || (c[1] === from.id && c[0] === to.id));
        }

        function checkEndGame() {
            const thief = nodes.find(n => n.role === 'thief');
            if (!thief) return;
            if (!nodes.some(n => isValidMove(thief, n))) {
                alert("Policiais venceram!");
                initGame();
            } else if (thief.level === 0) {
                alert("Ladrão venceu!");
                initGame();
            }
        }

        initGame();
    </script>
</body>
</html>
